server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Nuxt static output uses pre-rendered HTML files per route.
    # Try the exact file, then a .html variant, then fall back to index.html for SPA fallback.
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    # Long-lived cache for hashed static assets (JS/CSS bundles, images)
    location ~* \.(js|css|woff|woff2|ttf|eot|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Short cache for images that may be swapped (e.g. tower photo)
    location ~* \.(png|jpg|jpeg|gif|ico|webp)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;
    gzip_min_length 256;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
