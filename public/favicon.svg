  <line x1="38" y1="22" x2="59" y2="84" stroke="#CECECE" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Horizontal cross-bars -->
  <line x1="30" y1="22" x2="38" y2="22" stroke="#CECECE" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="23" y1="43" x2="45" y2="43" stroke="#CECECE" stroke-width="2.5" stroke-linecap="round"/>
